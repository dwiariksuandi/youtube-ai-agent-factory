name: "Daily AGENTIC AI Factory"
on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC = 09:00 WIB
  workflow_dispatch:  # Manual trigger via GitHub UI

jobs:
  run-agent-factory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd agentfactory
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Prepare environment secrets
        run: |
          cd agentfactory
          echo "PRIMARY_LLAMA3_API_URL=${{ secrets.PRIMARY_LLAMA3_API_URL }}" >> .env
          echo "PRIMARY_LLAMA3_API_KEY=${{ secrets.PRIMARY_LLAMA3_API_KEY }}" >> .env
          echo "PRIMARY_GEMINI_API_KEY=${{ secrets.PRIMARY_GEMINI_API_KEY }}" >> .env
          # ... (lainnya sama)

      - name: Run 1x-click Agent Factory
        run: |
          cd agentfactory
          source venv/bin/activate
          python run_agentfactory.py

      - name: Push back changes (analytics, logs, etc.)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🤖 Auto-update Agent #17: run + analytics" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
